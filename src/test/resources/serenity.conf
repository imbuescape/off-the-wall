serenity {

  project.name = "HO View Prep Pack Automation"

  take.screenshots = FOR_FAILURES

  restart.browser.for.each = scenario

  logging = NORMAL
}

webdriver {

  driver = remote

  base.url = "https://www.saucedemo.com"

  remote {
    url = "http://localhost:4444/wd/hub"
  }

  capabilities {
    browserName = "chrome"
  }

  timeouts {
    implicitly wait = 5000
    fluent wait = 10000
    page load = 60000
  }
}

chrome {
  webdriver.capabilities {

    browserName = "chrome"

    "goog:chromeOptions" {
      args = [
        "--start-maximized",
        "--disable-dev-shm-usage",
        "--no-sandbox"
      ]
    }
  }
}

firefox {
  webdriver.capabilities {

    browserName = "firefox"

    "moz:firefoxOptions" {
      args = []
    }

  }
}

edge {
  webdriver.capabilities {

    browserName = "MicrosoftEdge"

  }
}